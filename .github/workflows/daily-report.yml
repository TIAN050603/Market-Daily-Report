name: Daily Market Report

on:
  schedule:
    # 08:00 ET during U.S. daylight saving time. Use 13:00 UTC during standard time.
    - cron: "0 12 * * 1-5"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, YYYY-MM-DD"
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run db:migrate
      - name: Generate report
        run: npm run reports:generate -- ${{ github.event.inputs.report_date }}
        env:
          REPORT_GENERATION_TOKEN: ${{ secrets.REPORT_GENERATION_TOKEN }}
      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data 20??-??/*.md || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add daily market report $(date -u +%F)"
            git push
          fi
      - name: Trigger deployed dashboard generation
        env:
          PUBLIC_GENERATE_URL: ${{ secrets.PUBLIC_GENERATE_URL }}
          REPORT_GENERATION_TOKEN: ${{ secrets.REPORT_GENERATION_TOKEN }}
          REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: |
          if [ -z "$PUBLIC_GENERATE_URL" ] || [ -z "$REPORT_GENERATION_TOKEN" ]; then
            echo "PUBLIC_GENERATE_URL or REPORT_GENERATION_TOKEN not configured; skipping deployed dashboard trigger."
            exit 0
          fi
          payload="{\"date\":\"${REPORT_DATE}\"}"
          if [ "$payload" = "{\"date\":\"\"}" ]; then
            payload="{}"
          fi
          curl --fail-with-body -X POST "${PUBLIC_GENERATE_URL}" \
            -H "Authorization: Bearer ${REPORT_GENERATION_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload"
